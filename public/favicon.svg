<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7c948"/>
      <stop offset="100%" stop-color="#d4900a"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Paper body -->
  <rect x="22" y="14" width="44" height="56" rx="6" fill="#1e1535" stroke="#4c1d95" stroke-width="1"/>

  <!-- Folded top-right corner -->
  <path d="M52 14 L66 14 L66 28 Z" fill="#0d0d1a" opacity="0.8"/>
  <path d="M52 14 L66 28 L52 28 Z" fill="url(#purple)" opacity="0.6"/>

  <!-- Text lines on paper -->
  <rect x="29" y="34" width="22" height="3" rx="1.5" fill="url(#gold)"/>
  <rect x="29" y="41" width="30" height="2.5" rx="1.25" fill="#4c3a6e"/>
  <rect x="29" y="47" width="26" height="2.5" rx="1.25" fill="#4c3a6e"/>
  <rect x="29" y="53" width="28" height="2.5" rx="1.25" fill="#4c3a6e"/>

  <!-- Lightning bolt (AI spark) -->
  <path d="M57 56 L51 70 L57 67 L54 80 L63 63 L57 66 Z" fill="url(#gold)" filter="url(#glow)"/>

  <!-- Subtle glow circle behind bolt -->
  <circle cx="57" cy="68" r="10" fill="#f7c948" opacity="0.08"/>
